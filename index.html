<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h1 class="title">Counter</h1>
    <div id="value" class="value neutral">0</div>
    <div class="controls">
        <button id="btn-minus" class="btn btn-minus">−</button>
        <button id="btn-reset" class="btn btn-reset">Reset</button>
        <button id="btn-plus" class="btn btn-plus">+</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
